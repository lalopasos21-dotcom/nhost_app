<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Account Updated</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.4px;
      color: #ffffff;
    }

    p {
      margin: 0 0 32px;
      font-size: 16px;
      line-height: 1.5;
      color: #c9c9c9;
      font-weight: 400;
    }

    .btn {
      display: inline-block;
      background: #ffffff;
      color: #000000;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.3s ease;
      letter-spacing: 0.2px;
    }

    .btn:hover {
      background: #e0e0e0;
      transform: translateY(-2px);
    }

    .subtle {
      font-size: 13px;
      color: #777;
      margin-top: 24px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Account Updated</h1>
    <p>Your profile has been successfully updated.<br>Changes are live now.</p>
    
    <a href="#" class="btn">Back to Profile</a>

    <div class="subtle">Depop • Keep it real</div>
  </div>

</body>
</html>
